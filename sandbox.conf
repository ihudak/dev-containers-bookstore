# sandbox.conf — optional component configuration for the AI sandbox container.
#
# Set a component to ON to include it in the image and mount its credentials.
# Set it to OFF (or comment it out) to exclude it entirely.
# Run ./runme.sh build after changing this file.

# ── AI agents ──────────────────────────────────────────────────────────────────
copilot=ON
kiro=OFF
claude-code=ON
codex=OFF

# ── Java / JVM ─────────────────────────────────────────────────────────────────
# Enable at most one JDK at a time, or enable multiple and set JAVA_HOME manually.
# graalvm-25 also installs the native-image toolchain.
openjdk-21=ON
openjdk-25=OFF
graalvm-25=OFF

# ── Cloud / infra ──────────────────────────────────────────────────────────────
github-cli=ON
kubectl=ON
aws-cli=ON
azure-cli=OFF

# ── Dynatrace ──────────────────────────────────────────────────────────────────
dtctl=ON
dtmgd=ON

# ── Dev tools ──────────────────────────────────────────────────────────────────
angular-cli=ON
