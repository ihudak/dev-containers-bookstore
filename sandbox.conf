# sandbox.conf — optional component configuration for the AI sandbox container.
#
# Boolean components: set to ON to include, OFF (or comment out) to exclude.
# Version-list components: set to a comma-separated list of versions to install,
#   or leave empty (key=) to skip. The latest/default version is always installed
#   for components that are required by AI agents (node, python).
#
# Run ./runme.sh build after changing this file.

# ── AI agents ──────────────────────────────────────────────────────────────────
copilot=ON
kiro=OFF
claude-code=ON
codex=OFF
gemini=OFF

# ── Java / JVM (via SDKMAN) ────────────────────────────────────────────────────
# SDKMAN is auto-installed when any JVM component has at least one version listed.
# Specify comma-separated version numbers. Leave empty (e.g. openjdk=) to skip.
# graalvm-ce  = GraalVM Community Edition (free, open-source). SDKMAN id: 25.0.2-graalce
# graalvm     = GraalVM Oracle (free for production since 2023). SDKMAN id: 25.0.3-graal
# Both graalvm variants also install the native-image toolchain.
# maven/gradle/kotlin/scala: specify a version (e.g. maven=3.9.9) or leave empty.
#
# NOTE: SDKMAN itself is always installed at the latest version (get.sdkman.io
# does not support version pinning). Use --no-cache to pick up SDKMAN updates.
openjdk=21
graalvm-ce=
graalvm=
kotlin=
scala=
maven=
gradle=

# ── Node.js (via nvm) ──────────────────────────────────────────────────────────
# The latest LTS is ALWAYS installed (required by AI agents like Copilot, Claude Code).
# List additional versions to install alongside it (comma-separated).
# Example: node=20,22  installs Node 20 and 22 in addition to the always-on latest LTS.
node=20,22

# nvm version — pin the nvm release used to install Node.js.
# Check https://github.com/nvm-sh/nvm/releases for newer versions.
# Leave empty to use the Dockerfile default.
nvm-version=v0.40.4

# ── Python (via pyenv) ─────────────────────────────────────────────────────────
# The latest stable Python is ALWAYS installed.
# List additional versions to install alongside it (comma-separated).
# Example: python=3.12,3.11
#
# NOTE: pyenv itself is always installed at the latest version (pyenv.run does
# not support version pinning). Use --no-cache to pick up pyenv updates.
python=3.12

# ── Ruby / Rails (via rvm) ─────────────────────────────────────────────────────
# rvm is auto-installed when ruby has a version set.
# rails requires ruby to be set; runme.sh will error if rails is set without ruby.
#
# NOTE: Unlike openjdk, node, and python — which accept comma-separated lists —
# ruby and rails each support ONLY A SINGLE VERSION. Specifying multiple versions
# (e.g. ruby=3.4.3,3.1.4) will cause the build to fail with a clear error.
# This is because Rails must be installed on a specific Ruby, and the pairing
# of multiple Rails versions to multiple Ruby versions is ambiguous.
#
# Use a specific version (e.g. ruby=3.4.3) or leave empty to skip.
ruby=
rails=

# ── Rust (via rustup) ──────────────────────────────────────────────────────────
# Accepted values: stable, beta, nightly, or a specific version (e.g. 1.87.0).
# Leave empty to skip.
rust=

# ── Go ─────────────────────────────────────────────────────────────────────────
# Specify a version (e.g. go=1.24.2) or leave empty to skip.
# Uses the official go.dev/dl tarball — no version manager needed.
go=

# ── Cloud / infra ──────────────────────────────────────────────────────────────
github-cli=ON
kubectl=ON
aws-cli=ON
azure-cli=OFF

# ── Dynatrace ──────────────────────────────────────────────────────────────────
# ON    = auto-detect and install the latest release (requires GitHub API access).
#         If the API is rate-limited, set GITHUB_TOKEN on your host before building,
#         or pin a specific version instead.
# x.y.z = install that exact version — no GitHub API call, fully reproducible.
# OFF   = skip entirely.
dtctl=ON
dtmgd=ON

# ── Dev tools ──────────────────────────────────────────────────────────────────
# angular-cli: ON = latest, version number = pinned (e.g. 19), OFF = skip.
# SINGLE VERSION ONLY (same restriction as ruby/rails).
# Angular CLI is included because AI coding agents frequently scaffold and
# modify Angular projects. It is not an AI agent itself.
angular-cli=ON
yarn=OFF
